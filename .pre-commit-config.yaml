# Pre-commit hook configuration.
# One-time install: `brew install pre-commit gitleaks && pre-commit install`
# Manual run on all files: `pre-commit run --all-files`
# Refresh hook versions: `pre-commit autoupdate`

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: forbidden-patterns
        name: Block personal-info patterns
        entry: python3 safety/check-patterns.py
        language: system
        pass_filenames: true
        types: [text]
